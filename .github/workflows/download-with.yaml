name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check commit message prefix
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"
      
          if echo "$MSG" | grep -qP '^(download-zip:|download:)'; then
            echo "✅ Valid download command found"
          else
            echo "⏭️ No download command at start of commit message — skipping workflow"
            # EXITED!
            exit 1
          fi

          
      
      - name: Setup yt-dlp using setup-yt-dlp
        uses: AnimMouse/setup-yt-dlp@main
        with:
          nightly: true
        
      - name: Setup yt-dlp YouTube cookies using setup-yt-dlp/cookies
        uses: AnimMouse/setup-yt-dlp/cookies@main
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}
      
      - name: Test yt-dlp by checking version
        run: yt-dlp --version
      
      
      # - name: Update yt-dlp YouTube cookies using setup-yt-dlp/cookies/update
      #   uses: AnimMouse/setup-yt-dlp/cookies/update@main
      #   with:
      #     cookies_secret_name: YOUTUBE_COOKIES
      #     token: ${{ secrets.GH_PAT }}
      
      # - name: Install aria2
      #   run: sudo apt-get install -y aria2

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"

            yt-dlp \
              -f "bestvideo[height=1080][ext=webm]+bestaudio[abr<=100]/bestvideo[height=1080][vcodec=avc1]+bestaudio[abr<=100]/bestvideo[height>=1000]+bestaudio[abr<=100]/bestvideo[height<=1080][height>=720][ext=webm]+bestaudio[abr<=100]/bestvideo[height<=1080][height>=720]+bestaudio[abr<=100]/best" \
              --output "tmp_downloads/%(title)s - %(upload_date)s@%(uploader)s [%(id)s].%(ext)s" \
              "$URL"
                
            # aria2c \
            #   --split=2 \
            #   --max-connection-per-server=2 \
            #   --min-split-size=90M \
            #   --dir="tmp_downloads" \
            #   "$URL"
          done

          # if [ "$MODE" = "zip" ]; then
          #   ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
          #   zip -j "$ARCHIVE_NAME" tmp_downloads/*
          # fi

          # Split any file over 90MB using zip native split (unzip compatible)
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            # if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
            # zip -s creates: file.zip, file.z01, file.z02, ...
            zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
            echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            # else
            #   cp "$FILE" "downloads/$BASENAME"
            # fi
          done

          rm -rf tmp_downloads    


      - name: Commit & Push in batches of 5 files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(find downloads/ -type f)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            for FILE in "${BATCH[@]}"; do
              git add "$FILE"
            done
            
            git commit -m "Add downloaded files — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"



   
